name: Daily Calendar Summary
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  send-calendar-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily calendar summary
        run: |
          curl -X POST "${{ secrets.VERCEL_DOMAIN }}/api/daily-calendar" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
