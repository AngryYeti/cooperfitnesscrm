name: Send Follow-Up Reminders
# Triggers every 3 hours via GitHub Actions
on:
  schedule:
    # Every 3 hours
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send reminders
        run: |
          curl -X POST "${{ secrets.VERCEL_DOMAIN }}/api/send-reminders" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
